<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cousiño-Macul · NYC Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #F8FAFC; }

  #header { background: white; border-bottom: 1px solid #E2E8F0; padding: 0 20px; height: 50px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  #logo { font-size: 14px; font-weight: 800; color: #1E293B; white-space: nowrap; }
  #logo span { color: #7C3AED; }

  #filters { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .zone-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .15s; }
  .zone-btn.active { box-shadow: 0 2px 8px rgba(0,0,0,.15); }

  #toggles { display: flex; gap: 6px; margin-left: auto; align-items: center; }
  .toggle-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; border: 1.5px solid; transition: all .15s; }
  #visible { font-size: 11px; color: #94A3B8; white-space: nowrap; }
  #visible strong { color: #1E293B; }

  #map { flex: 1; }

  /* Legend */
  #legend { background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,.09); font-size: 10px; pointer-events: none; line-height: 1; }
  .leg-title { font-size: 8.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 7px; }
  .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; color: #374151; font-size: 10px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; flex-shrink: 0; }
  .leg-hr { border: none; border-top: 1px solid #E2E8F0; margin: 7px 0; }

  .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,.13) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">🍷 Cousiño-Macul · <span>Get Up</span> NYC</div>

  <div id="filters">
    <span style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#94A3B8;">Zona:</span>
    <button class="zone-btn active" data-zone="Todos"     style="background:#1E293B;color:white;">Todos (59)</button>
    <button class="zone-btn"        data-zone="Manhattan" style="background:#FEE2E2;color:#991B1B;">Manhattan (38)</button>
    <button class="zone-btn"        data-zone="Brooklyn"  style="background:#DBEAFE;color:#1D4ED8;">Brooklyn (11)</button>
    <button class="zone-btn"        data-zone="Bronx"     style="background:#D1FAE5;color:#065F46;">The Bronx (4)</button>
    <button class="zone-btn"        data-zone="Queens"    style="background:#FEF3C7;color:#92400E;">Queens (1)</button>
  </div>

  <div id="toggles">
    <button class="toggle-btn" id="tw" style="background:#FEF3C7;border-color:#F59E0B;color:#92400E;">⭕ Winebow (51)</button>
    <button class="toggle-btn" id="tg" style="background:#EDE9FE;border-color:#7C3AED;color:#5B21B6;">⭐ Get Up (8)</button>
    <span id="visible"><strong>59</strong> visibles</span>
  </div>
</div>

<div id="map"></div>

<script>
const BORO = {
  Manhattan: { dot:"#DC2626", fill:"#FEE2E2", label:"#991B1B" },
  Brooklyn:  { dot:"#2563EB", fill:"#DBEAFE", label:"#1D4ED8" },
  Bronx:     { dot:"#059669", fill:"#D1FAE5", label:"#065F46" },
  Queens:    { dot:"#D97706", fill:"#FEF3C7", label:"#92400E" },
};

const STAGES = [
  { label:"Prospecto",       icon:"🎯", color:"#64748B", bg:"#F8FAFC" },
  { label:"Primer Contacto", icon:"📞", color:"#D97706", bg:"#FFFBEB" },
  { label:"Presentación",    icon:"🍷", color:"#7C3AED", bg:"#F5F3FF" },
  { label:"Seguimiento",     icon:"🔁", color:"#0369A1", bg:"#F0F9FF" },
  { label:"Cerrado ✓",       icon:"✅", color:"#15803D", bg:"#F0FDF4" },
];

const WINEBOW = [
  { name:"Renaissance Fine Wine & Spirits", addr:"161 Freedom Pl",      city:"Manhattan", lat:40.7753, lng:-73.9916 },
  { name:"Blue Streak Wines & Spirits",     addr:"4720 Center Blvd",     city:"Queens",    lat:40.7468, lng:-73.9543 },
  { name:"Alison",                          addr:"110 Saint Marks Pl",   city:"Manhattan", lat:40.7278, lng:-73.9857 },
  { name:"PJs Liquor Warehouse",            addr:"4898 Broadway",        city:"Manhattan", lat:40.8680, lng:-73.9274 },
  { name:"Winery The",                      addr:"257 W 116th St",       city:"Manhattan", lat:40.8021, lng:-73.9536 },
  { name:"Empellon",                        addr:"230 W 4th St",         city:"Manhattan", lat:40.7317, lng:-74.0033 },
  { name:"First Avenue Vintner",            addr:"984 1st Ave",          city:"Manhattan", lat:40.7561, lng:-73.9652 },
  { name:"Gun Hill Liquor Warehouse",       addr:"5790 Broadway",        city:"Bronx",     lat:40.8888, lng:-73.8977 },
  { name:"MMJ Wines & Spirits",             addr:"4251 Katonah Ave",     city:"Bronx",     lat:40.8776, lng:-73.8668 },
  { name:"Winebow Non Retail",              addr:"31 W 27th St",         city:"Manhattan", lat:40.7459, lng:-73.9894 },
  { name:"Cafe 53",                         addr:"126 W 53rd St",        city:"Manhattan", lat:40.7626, lng:-73.9845 },
  { name:"Palo Santo",                      addr:"652 Union St",         city:"Brooklyn",  lat:40.6764, lng:-73.9765 },
  { name:"Rosetta Wines",                   addr:"44 Exchange Pl",       city:"Manhattan", lat:40.7054, lng:-74.0113 },
  { name:"Beacon Wine & Liquor",            addr:"2120 Broadway",        city:"Manhattan", lat:40.7844, lng:-73.9814 },
  { name:"Caesars Wines & Liquors",         addr:"6715 Bay Pkwy",        city:"Brooklyn",  lat:40.6143, lng:-73.9988 },
  { name:"Dirty Precious LLC",              addr:"317 3rd Ave",          city:"Brooklyn",  lat:40.6710, lng:-73.9840 },
  { name:"Garnett Wines & Liquor",          addr:"929 Lexington Ave",    city:"Manhattan", lat:40.7707, lng:-73.9643 },
  { name:"Riverdale Vintner",               addr:"549 W 235th St",       city:"Bronx",     lat:40.8993, lng:-73.9120 },
  { name:"Vines on Pinehurst",              addr:"814 W 187th St",       city:"Manhattan", lat:40.8517, lng:-73.9313 },
  { name:"Harlemite Restaurant",            addr:"231 Lenox Ave",        city:"Manhattan", lat:40.8014, lng:-73.9484 },
  { name:"Meichi Na Liquor",                addr:"391 Flatbush Ave",     city:"Brooklyn",  lat:40.6749, lng:-73.9763 },
  { name:"Young Ethels",                    addr:"506 5th Ave",          city:"Brooklyn",  lat:40.6597, lng:-73.9797 },
  { name:"Bowery & Vine",                   addr:"269 Bowery",           city:"Manhattan", lat:40.7235, lng:-73.9933 },
  { name:"Dr Wine",                         addr:"1287 1st Ave",         city:"Manhattan", lat:40.7648, lng:-73.9565 },
  { name:"Empellon Al Pastor",              addr:"132 Saint Marks Pl",   city:"Manhattan", lat:40.7282, lng:-73.9840 },
  { name:"Gastromarket",                    addr:"315 10th Ave",         city:"Manhattan", lat:40.7499, lng:-74.0023 },
  { name:"Grand Cru Wine & Spirits",        addr:"555 W 42nd St",        city:"Manhattan", lat:40.7582, lng:-74.0002 },
  { name:"Leonetta",                        addr:"181 Lexington Ave",    city:"Manhattan", lat:40.7427, lng:-73.9856 },
  { name:"Liquor Land",                     addr:"930 East 233rd St",    city:"Bronx",     lat:40.8946, lng:-73.8594 },
  { name:"SoHo Wines & Spirits",            addr:"461 W Broadway",       city:"Manhattan", lat:40.7250, lng:-74.0007 },
  { name:"Wine Story",                      addr:"1585 1st Ave",         city:"Manhattan", lat:40.7690, lng:-73.9554 },
  { name:"Amsterwine",                      addr:"475 9th Ave",          city:"Manhattan", lat:40.7534, lng:-74.0002 },
  { name:"Baluchis Masala",                 addr:"60 Pearl St",          city:"Manhattan", lat:40.7041, lng:-74.0131 },
  { name:"Indian Summer",                   addr:"239 Malcolm X Blvd",   city:"Manhattan", lat:40.8057, lng:-73.9473 },
  { name:"Katsuhama Restaurant",            addr:"11 E 47th St",         city:"Manhattan", lat:40.7575, lng:-73.9776 },
  { name:"Keens Steakhouse",                addr:"72 W 36th St",         city:"Manhattan", lat:40.7499, lng:-73.9880 },
  { name:"Tipsy",                           addr:"584 Myrtle Ave",       city:"Brooklyn",  lat:40.6959, lng:-73.9651 },
  { name:"Vin de Table",                    addr:"832 DeKalb Ave",       city:"Brooklyn",  lat:40.6914, lng:-73.9452 },
  { name:"Food in Motion",                  addr:"214 Sullivan St",      city:"Manhattan", lat:40.7283, lng:-74.0003 },
  { name:"Garrys Wine & Liquor",            addr:"231 Flatbush Ave",     city:"Brooklyn",  lat:40.6849, lng:-73.9783 },
  { name:"Heights Chateau",                 addr:"123 Atlantic Ave",     city:"Brooklyn",  lat:40.6902, lng:-73.9955 },
  { name:"Mister Wright Fine Wines",        addr:"1593 3rd Ave",         city:"Manhattan", lat:40.7847, lng:-73.9531 },
  { name:"Morton Williams Wines",           addr:"1219 Madison Ave",     city:"Manhattan", lat:40.7870, lng:-73.9566 },
  { name:"Ona",                             addr:"1685 Lexington Ave",   city:"Manhattan", lat:40.7886, lng:-73.9466 },
  { name:"Park Avenue Liquors",             addr:"292 Madison Ave",      city:"Manhattan", lat:40.7503, lng:-73.9836 },
  { name:"Il Vignetto",                     addr:"145 Union St",         city:"Brooklyn",  lat:40.6815, lng:-73.9998 },
  { name:"Robert Restaurant",               addr:"2 Columbus Cir",       city:"Manhattan", lat:40.7683, lng:-73.9822 },
  { name:"Artesano",                        addr:"90 Chambers St",       city:"Manhattan", lat:40.7138, lng:-74.0079 },
  { name:"67 Wine & Spirits",               addr:"179 Columbus Ave",     city:"Manhattan", lat:40.7762, lng:-73.9818 },
  { name:"Absolut Spirits Company",         addr:"401 Park Ave S",       city:"Manhattan", lat:40.7448, lng:-73.9832 },
  { name:"Couleur Cafe",                    addr:"435 7th Ave",          city:"Brooklyn",  lat:40.6631, lng:-73.9799 },
];

const GETUP = [
  { id:0, name:"Hell's Kitchen Wines & Spirits", addr:"408 W 55th St",        city:"Manhattan", lat:40.7657, lng:-73.9901, type:"retail",     stage:0 },
  { id:1, name:"Shon 45 Wine & Spirits",          addr:"840 8th Ave",          city:"Manhattan", lat:40.7637, lng:-73.9867, type:"retail",     stage:0 },
  { id:2, name:"Liberty Fine Wines & Spirits",    addr:"706 9th Ave",          city:"Manhattan", lat:40.7632, lng:-73.9896, type:"retail",     stage:0 },
  { id:3, name:"Penn Cellars",                    addr:"1 Pennsylvania Plaza", city:"Manhattan", lat:40.7506, lng:-73.9937, type:"retail",     stage:0 },
  { id:4, name:"NuyoRes Restaurant",              addr:"154 W 13th St",        city:"Manhattan", lat:40.7371, lng:-74.0000, type:"restaurant", stage:0 },
  { id:5, name:"Restaurant Rosso",                addr:"127 E 7th St",         city:"Manhattan", lat:40.7262, lng:-73.9831, type:"restaurant", stage:0 },
  { id:6, name:"Central Perk",                    addr:"1420 6th Ave",         city:"Manhattan", lat:40.7668, lng:-73.9793, type:"restaurant", stage:0 },
  { id:7, name:"55th St Wine & Spirits",          addr:"50 W 55th St",         city:"Manhattan", lat:40.7621, lng:-73.9776, type:"retail",     stage:0 },
];

// ── State ──────────────────────────────────────────────────────
let zone = "Todos", showW = true, showG = true;
let markers = [];

// ── Map init ───────────────────────────────────────────────────
const map = L.map("map", { center:[40.730,-73.980], zoom:12 });
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom:19
}).addTo(map);

// Legend control
const legend = L.control({ position:"bottomleft" });
legend.onAdd = () => {
  const d = L.DomUtil.create("div","");
  d.id = "legend";
  d.innerHTML = `
    <div class="leg-title">Winebow activos</div>
    <div class="leg-row"><div class="leg-dot" style="background:#DC2626;box-shadow:0 0 0 1px #DC2626"></div>Manhattan</div>
    <div class="leg-row"><div class="leg-dot" style="background:#2563EB;box-shadow:0 0 0 1px #2563EB"></div>Brooklyn</div>
    <div class="leg-row"><div class="leg-dot" style="background:#059669;box-shadow:0 0 0 1px #059669"></div>The Bronx</div>
    <div class="leg-row"><div class="leg-dot" style="background:#D97706;box-shadow:0 0 0 1px #D97706"></div>Queens</div>
    <div class="leg-hr"></div>
    <div class="leg-title">Get Up · En desarrollo</div>
    <div class="leg-row">
      <svg width="14" height="14" viewBox="0 0 22 22" style="flex-shrink:0">
        <polygon points="11,1 13.9,7.6 21,8.6 16,13.4 17.2,20.5 11,17 4.8,20.5 6,13.4 1,8.6 8.1,7.6" fill="#7C3AED" stroke="white" stroke-width="1.8"/>
      </svg>
      Get Up (8)
    </div>`;
  return d;
};
legend.addTo(map);

// ── Icons ──────────────────────────────────────────────────────
function dotIcon(color) {
  return L.divIcon({
    className:"",
    html:`<div style="width:13px;height:13px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 1px 6px rgba(0,0,0,.4);"></div>`,
    iconSize:[13,13], iconAnchor:[6.5,6.5], popupAnchor:[0,-9]
  });
}
function starIcon() {
  return L.divIcon({
    className:"",
    html:`<svg width="20" height="20" viewBox="0 0 22 22"><polygon points="11,1 13.9,7.6 21,8.6 16,13.4 17.2,20.5 11,17 4.8,20.5 6,13.4 1,8.6 8.1,7.6" fill="#7C3AED" stroke="white" stroke-width="1.8"/></svg>`,
    iconSize:[20,20], iconAnchor:[10,10], popupAnchor:[0,-12]
  });
}

// ── Popup HTML ─────────────────────────────────────────────────
function winebowPopup(c) {
  const col = BORO[c.city] || { fill:"#F1F5F9", label:"#374151" };
  return `<div style="font-family:system-ui,sans-serif;min-width:180px;">
    <div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:3px;line-height:1.3;">${c.name}</div>
    <div style="font-size:11px;color:#94A3B8;margin-bottom:8px;">📍 ${c.addr}</div>
    <span style="padding:2px 9px;border-radius:7px;font-size:10px;font-weight:700;background:${col.fill};color:${col.label};">${c.city}</span>
  </div>`;
}

function getupPopup(c) {
  const st = STAGES[c.stage];
  const typeBg    = c.type==="restaurant" ? "#FEF3C7" : "#F0F9FF";
  const typeColor = c.type==="restaurant" ? "#92400E"  : "#0369A1";
  const typeLabel = c.type==="restaurant" ? "🍽 Restaurant" : "🍾 Retail";
  return `<div style="font-family:system-ui,sans-serif;min-width:190px;">
    <div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:3px;line-height:1.3;">${c.name}</div>
    <div style="font-size:11px;color:#94A3B8;margin-bottom:9px;">📍 ${c.addr}</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;">
      <span style="padding:2px 9px;border-radius:7px;font-size:10px;font-weight:700;background:#EDE9FE;color:#5B21B6;">⭐ Get Up</span>
      <span style="padding:2px 9px;border-radius:7px;font-size:10px;font-weight:600;background:${st.bg};color:${st.color};">${st.icon} ${st.label}</span>
      <span style="padding:2px 9px;border-radius:7px;font-size:10px;font-weight:600;background:${typeBg};color:${typeColor};">${typeLabel}</span>
    </div>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  markers.forEach(m => m.remove());
  markers = [];

  let count = 0;

  if (showW) {
    WINEBOW.forEach(c => {
      if (zone !== "Todos" && c.city !== zone) return;
      const m = L.marker([c.lat,c.lng], { icon: dotIcon(BORO[c.city]?.dot||"#64748B") });
      m.bindPopup(winebowPopup(c), { maxWidth:240 });
      m.addTo(map); markers.push(m); count++;
    });
  }

  if (showG) {
    GETUP.forEach(c => {
      if (zone !== "Todos" && c.city !== zone) return;
      const m = L.marker([c.lat,c.lng], { icon: starIcon() });
      m.bindPopup(getupPopup(c), { maxWidth:240 });
      m.addTo(map); markers.push(m); count++;
    });
  }

  document.getElementById("visible").innerHTML = `<strong>${count}</strong> visibles`;
}

// ── Zone filter buttons ────────────────────────────────────────
document.querySelectorAll(".zone-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    zone = btn.dataset.zone;
    document.querySelectorAll(".zone-btn").forEach(b => {
      b.classList.remove("active");
      b.style.boxShadow = "none";
      b.style.opacity   = "1";
    });
    btn.classList.add("active");
    btn.style.boxShadow = "0 2px 8px rgba(0,0,0,.18)";
    render();
  });
});

// ── Toggle buttons ─────────────────────────────────────────────
document.getElementById("tw").addEventListener("click", function() {
  showW = !showW;
  this.style.background   = showW ? "#FEF3C7" : "#F8FAFC";
  this.style.borderColor  = showW ? "#F59E0B" : "#E2E8F0";
  this.style.color        = showW ? "#92400E"  : "#CBD5E1";
  render();
});

document.getElementById("tg").addEventListener("click", function() {
  showG = !showG;
  this.style.background  = showG ? "#EDE9FE" : "#F8FAFC";
  this.style.borderColor = showG ? "#7C3AED" : "#E2E8F0";
  this.style.color       = showG ? "#5B21B6"  : "#CBD5E1";
  render();
});

render();
</script>
</body>
</html>
